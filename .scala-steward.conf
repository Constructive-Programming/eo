# (CVE-2026-54515, dependabot alert #7). 2.21.5 is patched; the re-fix lands
# in 2.22.1 (unreleased). Keep both artifacts on the 2.21.x series and lift
# this pin together with the build.sbt comment once 2.22.1 is on Central.
updates.pin = [
  { groupId = "com.fasterxml.jackson.core", artifactId = "jackson-core", version = "2.21." },
  { groupId = "com.fasterxml.jackson.core", artifactId = "jackson-databind", version = "2.21." }
]
