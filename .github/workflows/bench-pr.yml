# Benchmark A/B on pull requests — same-job, same-VM base/head comparison.
#
# Hand-maintained (like benchmarks.yml) — NOT generated by sbt
# githubWorkflowGenerate; keep it out of the sbt-typelevel config.
#
# Design (docs/plans/2026-07-10-001-feat-benchmark-ci-pipeline-plan.md):
#   * Same-repo PRs only. This job executes PR-head code (sbt = arbitrary
#     execution) while holding pull-requests:write for the sticky comment,
#     so fork PRs are excluded entirely — same accepted caveat as
#     deploy-site.yml. Fork PRs get no run and no comment.
#   * Affected-only: `.github/bench/bench_tools.py affected` maps the PR
#     diff to bench classes (transitively: core/ or harness changes mean
#     the full suite). Docs/site/tests-only PRs skip after a seconds-cheap
#     first step. A `perf:full` label forces the full suite.
#   * Reduced JMH profile (benchQuick params + -prof gc): B/op — the gc
#     allocation norm — is deterministic on shared runners and is the only
#     metric that may ever gate; ns/op is directional advice. Full-rigor
#     numbers come from the nightly sweep, not from PRs.
#   * Advisory-first: while `.github/bench/thresholds.json` does not exist
#     the diff never fails the job; bench/compile failures surface as an
#     explicit ❌ comment, never silent green tables (and never a red X
#     blocking review on an advisory signal).
#   * A/A calibration: workflow_dispatch with mode=aa benchmarks the same
#     ref twice in one job and emits the noise-floor report used to set
#     thresholds (R5). Calibration is bound to the JMH profile below —
#     changing the profile invalidates thresholds.json.

name: Benchmark A/B

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, labeled]
  workflow_dispatch:
    inputs:
      mode:
        description: "ab = merge-base vs ref; aa = ref vs itself (noise calibration)"
        required: false
        default: "ab"
      filter:
        description: "JMH class/method regex override (blank = affected/full)"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # The measurement profile. thresholds.json is calibrated against exactly
  # this string — change it and the gate reverts to advisory until an A/A
  # recalibration (delete thresholds.json in the same PR).
  JMH_PROFILE: "pr:-i3-wi2-f1-t1-gc"
  JMH_FLAGS: "-i 3 -wi 2 -f 1 -t 1 -foe true -prof gc -rf json"

jobs:
  bench-ab:
    name: A/B (${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'pr' }})
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    # Same-repo guard: never run fork PR code in a job that holds a write
    # scope (see header). deploy-site.yml documents the same policy.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout (full history for merge-base)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Bench tool self-test + mapping drift check
        run: |
          python3 -m unittest discover .github/bench
          python3 .github/bench/bench_tools.py validate-mapping

      - name: Determine affected benchmarks and SHAs
        id: plan
        env:
          EVENT: ${{ github.event_name }}
          MODE: ${{ inputs.mode || 'ab' }}
          FILTER_OVERRIDE: ${{ inputs.filter || '' }}
          PERF_FULL: ${{ contains(github.event.pull_request.labels.*.name, 'perf:full') }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          HEAD_REF="$(git rev-parse HEAD)"   # PR events: the merge commit
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$MODE" = "aa" ]; then
            BASE_REF="$HEAD_REF"
            REGEX="${FILTER_OVERRIDE:-FULL}"
          else
            BASE_REF="$(git merge-base origin/main HEAD)"
            if [ -n "$FILTER_OVERRIDE" ]; then
              REGEX="$FILTER_OVERRIDE"
            elif [ "$PERF_FULL" = "true" ]; then
              REGEX="FULL"
            else
              REGEX="$(git diff --name-only "$BASE_REF"...HEAD \
                       | python3 .github/bench/bench_tools.py affected)"
            fi
          fi
          if [ -z "$REGEX" ]; then
            echo "No benchmark-mapped paths changed — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # FULL = run the whole suite (every bench class matches Bench.)
          [ "$REGEX" = "FULL" ] && REGEX='.*Bench\..*'
          {
            echo "skip=false"
            echo "regex=$REGEX"
            echo "base=$BASE_REF"
            echo "head=$HEAD_REF"
            echo "head_display=${PR_HEAD:-$HEAD_REF}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup sbt
        if: steps.plan.outputs.skip == 'false'
        uses: sbt/setup-sbt@v1

      - name: Setup Java (temurin@21)
        if: steps.plan.outputs.skip == 'false'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Base run (${{ steps.plan.outputs.base }})
        id: base
        if: steps.plan.outputs.skip == 'false'
        continue-on-error: true # failure becomes an explicit ❌ comment state
        run: |
          git checkout --quiet "${{ steps.plan.outputs.base }}"
          sbt -batch -Dsbt.color=false \
            "benchmarks/Jmh/run $JMH_FLAGS -rff base.json ${{ steps.plan.outputs.regex }}"

      - name: Head run (${{ steps.plan.outputs.head_display }})
        id: head
        if: steps.plan.outputs.skip == 'false'
        continue-on-error: true
        run: |
          git checkout --quiet "${{ steps.plan.outputs.head }}"
          sbt -batch -Dsbt.color=false \
            "benchmarks/Jmh/run $JMH_FLAGS -rff head.json ${{ steps.plan.outputs.regex }}"

      - name: Diff and render comment
        id: diff
        if: steps.plan.outputs.skip == 'false'
        env:
          BASE_OUTCOME: ${{ steps.base.outcome }}
          HEAD_OUTCOME: ${{ steps.head.outcome }}
        run: |
          PROV=(--base-sha "${{ steps.plan.outputs.base }}" \
                --head-sha "${{ steps.plan.outputs.head_display }}" \
                --jdk temurin-21 --runner ubuntu-22.04 \
                --jmh-params "$JMH_FLAGS" --profile "$JMH_PROFILE")
          GATE=0
          if [ "$BASE_OUTCOME" != "success" ] || [ "$HEAD_OUTCOME" != "success" ]; then
            FAIL="base: $BASE_OUTCOME, head: $HEAD_OUTCOME — sbt Jmh/run failed (compile error on that side? see the run logs)"
            python3 .github/bench/bench_tools.py comment-md --failure "$FAIL" > comment.md
          else
            python3 .github/bench/bench_tools.py diff \
              benchmarks/base.json benchmarks/head.json -o deltas.json "${PROV[@]}" \
              || GATE=$?
            python3 .github/bench/bench_tools.py comment-md deltas.json > comment.md
          fi
          cat comment.md >> "$GITHUB_STEP_SUMMARY"
          echo "gate=$GATE" >> "$GITHUB_OUTPUT"

      - name: Post sticky comment
        if: steps.plan.outputs.skip == 'false' && github.event_name == 'pull_request'
        # Pinned by SHA (v3.0.5): the one third-party action in a job with a
        # write scope.
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88
        with:
          header: bench-ab
          path: comment.md

      - name: A/A noise report
        if: steps.plan.outputs.skip == 'false' && inputs.mode == 'aa'
        run: |
          python3 .github/bench/bench_tools.py noise-report deltas.json \
            | tee noise-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always() && steps.plan.outputs.skip == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: bench-ab-${{ github.run_id }}
          path: |
            benchmarks/base.json
            benchmarks/head.json
            deltas.json
            comment.md
            noise-report.md
          retention-days: 30
          if-no-files-found: warn

      # Advisory-first (R4): while thresholds.json is absent, `diff` always
      # exits 0 and this step never fires. Once calibration lands a
      # thresholds.json, a B/op regression beyond threshold fails the job.
      - name: B/op gate
        if: steps.plan.outputs.skip == 'false' && steps.diff.outputs.gate != '0'
        run: |
          echo "B/op gate violation (see sticky comment / step summary)."
          exit 1
