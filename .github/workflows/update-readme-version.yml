# Hand-maintained (like benchmarks.yml) — NOT generated by sbt githubWorkflowGenerate;
# do not add it to the sbt-typelevel config.
#
# Follow-up to a successful release: when the tag build of "Continuous
# Integration" (which publishes to Maven Central) completes green, rewrite the
# artifact version strings in README.md on main to the released version.
# `workflow_dispatch` runs the same sync against the latest reachable v* tag,
# for backfilling or a missed run.

name: Update README version

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-readme-version
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-22.04
    # workflow_run fires for every CI completion; act only on a SUCCESSFUL
    # tag build (head_branch is the tag name for tag-triggered runs).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0 # full history + tags, for the dispatch path

      - name: Resolve released version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$(git describe --tags --abbrev=0 --match 'v[0-9]*')"
          else
            TAG="$HEAD_BRANCH"
          fi
          VERSION="${TAG#v}"
          # Final releases only — leave the README alone for RCs/milestones.
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Not a final release version: $TAG — skipping."
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Released version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rewrite artifact versions in README.md
        if: steps.version.outputs.version != ''
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Rewrites only the version literal in dependency lines like
          #   libraryDependencies += "dev.constructive" %% "cats-eo-laws" % "0.1.0" % Test
          # (any `% Test` / trailing config survives). Prose mentions of
          # historical versions are deliberately left untouched.
          sed -E -i \
            "s/(\"dev\.constructive\" *%% *\"cats-eo[a-z-]*\" *% *)\"[0-9][^\"]*\"/\1\"$VERSION\"/" \
            README.md
          git diff --stat README.md

      - name: Commit to main
        if: steps.version.outputs.version != ''
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git diff --quiet README.md; then
            echo "README.md already at $VERSION — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(readme): bump artifact versions to $VERSION" README.md
          git push origin main
