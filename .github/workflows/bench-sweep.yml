# Full benchmark sweep on main / release tags — the history + publication leg.
#
# Hand-maintained (like benchmarks.yml) — NOT generated by sbt
# githubWorkflowGenerate; keep it out of the sbt-typelevel config.
#
# Design (docs/plans/2026-07-10-001-feat-benchmark-ci-pipeline-plan.md):
#   * Nightly (cron) full sweep of main at full JMH rigor, no-oping when
#     main hasn't moved since the last recorded sweep. "Moved" excludes this
#     workflow's own generated-file bot commits — the comparison key is the
#     last commit touching anything BUT BENCHMARKS.md / the series file,
#     checked against the source_sha recorded in the series (R9: the bot
#     commit must never retrigger a sweep).
#   * Release sweeps ride `workflow_run` on a successful "Continuous
#     Integration" v* tag build (same trigger as update-readme-version.yml)
#     — no edit to the generated ci.yml, no race with the publish build.
#     Tag sweeps skip the no-op check and additionally attach the results
#     to the GitHub release (created as a draft if the human hasn't cut the
#     release object yet).
#   * Publishing: ONE atomic bot commit to main ([skip ci], pattern:
#     update-readme-version.yml) carrying both BENCHMARKS.md and one JSONL
#     line (full provenance) appended to site/laika-static/bench/series.jsonl
#     (append-only, this workflow is the only writer). The chart page lives
#     in-tree at site/laika-static/bench/index.html; Laika copies both
#     verbatim into the docs site, so the chart serves from the existing
#     Cloudflare Pages deployment at /bench/ — refreshed at the next site
#     deploy (preview per main push, production per v* tag).
#   * This workflow executes trusted (main/tag) code only and is the only
#     bench workflow holding contents:write (R15).
#
# Budget note (R14): the sweep runs single-job first; measure the wall time
# of the first real runs. If it exceeds ~5h, shard by bench-class groups
# across a matrix with a JSON merge step — see .github/bench/README.md.

name: Benchmark sweep

on:
  schedule:
    - cron: "43 1 * * *" # nightly, off the top-of-hour rush
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]
  workflow_dispatch:
    inputs:
      filter:
        description: "JMH class/method regex (blank = full suite)"
        required: false
        default: ""
      force:
        description: "Sweep even if main is unchanged since the last one"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: bench-sweep # serialize sweeps: single writer for the series
  cancel-in-progress: false

env:
  JMH_PROFILE: "sweep:-i5-wi3-f3-t1-gc"
  JMH_FLAGS: "-i 5 -wi 3 -f 3 -t 1 -foe true -prof gc -rf json"

jobs:
  sweep:
    name: Full sweep (${{ github.event.workflow_run.head_branch || 'main' }})
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    # workflow_run fires for every CI completion; act only on a SUCCESSFUL
    # v* tag build (head_branch is the tag name for tag-triggered runs).
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - name: Checkout sweep source (tag for releases, else main)
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_branch || 'main' }}
          fetch-depth: 0

      - name: Bench tool self-test + mapping drift check
        run: |
          python3 -m unittest discover .github/bench
          python3 .github/bench/bench_tools.py validate-mapping

      - name: Resolve sweep context (no-op check)
        id: ctx
        env:
          EVENT: ${{ github.event_name }}
          TAG: ${{ github.event.workflow_run.head_branch }}
          FORCE: ${{ inputs.force || 'false' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # The swept source state, ignoring this workflow's own generated-
          # file commits: last commit touching anything but BENCHMARKS.md /
          # the series file.
          SERIES="site/laika-static/bench/series.jsonl"
          SOURCE_SHA="$(git log -1 --format=%H -- . ':!BENCHMARKS.md' ":!$SERIES")"
          LAST_SWEPT="$(git show origin/main:"$SERIES" 2>/dev/null | tail -1 \
            | python3 -c 'import json,sys; s=sys.stdin.read().strip(); print(json.loads(s)["source_sha"] if s else "")')"
          SKIP=false
          if [ "$EVENT" = "schedule" ] || { [ "$EVENT" = "workflow_dispatch" ] && [ "$FORCE" != "true" ]; }; then
            if [ -n "$LAST_SWEPT" ] && [ "$LAST_SWEPT" = "$SOURCE_SHA" ]; then
              echo "main unchanged since last sweep ($LAST_SWEPT) — no-op."
              SKIP=true
            fi
          fi
          {
            echo "skip=$SKIP"
            echo "source_sha=$SOURCE_SHA"
            echo "tag=$TAG"
            echo "date=$(date -u +%Y-%m-%d)"
          } >> "$GITHUB_OUTPUT"

      - name: Setup sbt
        if: steps.ctx.outputs.skip == 'false'
        uses: sbt/setup-sbt@v1

      - name: Setup Java (temurin@21)
        if: steps.ctx.outputs.skip == 'false'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Run full JMH sweep
        if: steps.ctx.outputs.skip == 'false'
        # NB: JMH's working dir under sbt is benchmarks/, so -rff sweep.json
        # lands at benchmarks/sweep.json (same note as benchmarks.yml).
        run: |
          sbt -batch -Dsbt.color=false \
            "benchmarks/Jmh/run $JMH_FLAGS -rff sweep.json ${{ inputs.filter || '' }}"

      # ONE atomic bot commit publishes both generated files. The no-op
      # check keys on the series' source_sha, so the series entry certifies
      # a COMPLETE publish — if the commit or push fails, the next nightly
      # re-sweeps and heals the gap instead of no-oping on a half-published
      # state. The chart (site/laika-static/bench/index.html) ships in-tree
      # and fetches series.jsonl relative to itself, so nothing is copied.
      - name: Render BENCHMARKS.md + append series, bot-commit to main
        if: steps.ctx.outputs.skip == 'false'
        run: |
          PROV=(--source-sha "${{ steps.ctx.outputs.source_sha }}" \
                --date "${{ steps.ctx.outputs.date }}" \
                --jdk temurin-21 --runner ubuntu-22.04 \
                --jmh-params "$JMH_FLAGS" --profile "$JMH_PROFILE")
          SERIES="site/laika-static/bench/series.jsonl"
          # Tag sweeps run detached; a local main may not exist yet.
          git checkout --quiet main 2>/dev/null || git checkout --quiet -B main origin/main
          git pull --quiet origin main
          python3 .github/bench/bench_tools.py benchmarks-md \
            benchmarks/sweep.json "${PROV[@]}" > BENCHMARKS.md
          python3 .github/bench/bench_tools.py append-series \
            benchmarks/sweep.json "${PROV[@]}" >> "$SERIES"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BENCHMARKS.md "$SERIES"
          # [skip ci]: R8 — the generated-file commit must not trigger CI
          # (or a site deploy); the no-op check above (source_sha excludes
          # both generated files) keeps it from ever retriggering a sweep
          # either. The site picks the new series up at its next deploy.
          git commit -m "docs(benchmarks): sweep ${{ steps.ctx.outputs.source_sha }} (${{ steps.ctx.outputs.date }}) [skip ci]"
          # Rebase-retry once: a human merge can race the nightly.
          git push origin main:refs/heads/main \
            || { git pull --rebase origin main && git push origin main:refs/heads/main; }

      - name: Attach results to the GitHub release
        if: steps.ctx.outputs.skip == 'false' && steps.ctx.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          # The release object is created manually today; draft-create if
          # the sweep finishes first so the asset always has a target.
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --draft --title "$TAG" \
                 --notes "Draft created by bench-sweep for benchmark assets."
          cp benchmarks/sweep.json "jmh-results-$TAG.json"
          gh release upload "$TAG" "jmh-results-$TAG.json" --clobber

      - name: Upload sweep artifact
        if: always() && steps.ctx.outputs.skip == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: bench-sweep-${{ steps.ctx.outputs.date }}-${{ github.run_id }}
          path: |
            benchmarks/sweep.json
            BENCHMARKS.md
          retention-days: 90
          if-no-files-found: warn
