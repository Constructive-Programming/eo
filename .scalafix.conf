// cats-eo scalafix rule set. See `build.sbt` for the wiring (semanticdb
// + scalafixDependencies + sbt-scalafix plugin) and CLAUDE.md for
// day-to-day commands (`sbt scalafixAll`, `sbt scalafixAll --check`).
//
// Rule selection rationale lives in the conversation that introduced
// scalafix to this build (search the conversation transcript for
// "Scalafix research"). In short: built-in semantic rules + typelevel-
// scalafix's cats-module rules + DisableSyntax bans for the patterns
// we deliberately don't use.

rules = [
  RemoveUnused
  OrganizeImports
  RedundantSyntax
  DisableSyntax
  TypelevelMapSequence
  TypelevelAs
]

OrganizeImports {
  // Let RemoveUnused handle unused-import deletion. Doing both leaves
  // the codebase in a broken state per the OrganizeImports docs:
  // "Do NOT use RemoveUnused.imports together with OrganizeImports
  // to remove unused imports".
  removeUnused = false

  // Scala 3 dialect: emit `*` wildcards and `as` renames instead of
  // `_` and `=>`. Otherwise the rule writes Scala 2-shaped imports
  // that `-Wconf` would then flag.
  targetDialect = Scala3

  // Group imports by source. `*` is the catch-all (third-party deps);
  // `scala.` and `java[x]?\\.` are stdlib. Same project's `dev.constructive.eo`
  // imports group with the catch-all so internal cross-module imports
  // sit next to library imports rather than alone.
  groups = [
    "scala."
    "java(x)?."
    "*"
  ]

  // Symbols (operators, all-caps constants) before alphabetic names
  // within a single import selector. Mostly cosmetic.
  importSelectorsOrder = SymbolsFirst

  // Auto-insert blank lines between groups; matches the existing
  // hand-written import blocks across the codebase.
  blankLines = Auto

  // When two imports of the same package appear, merge them into a
  // single import with grouped selectors.
  groupedImports = Merge
}

DisableSyntax {
  // No XML literals â€” we don't ship any and the dialect adds no value
  // for an optics library.
  noXml = true

  // No `finalize()` overrides â€” JVM antipattern, no production use.
  noFinalize = true

  // Functional Scala doesn't use `return`; explicit returns hint at
  // imperative-style refactor work that should restructure as
  // expressions instead. The circe walk-and-rebuild paths refactored
  // to drop the `return` keyword in 2026-04-25 â€” see
  // `JsonFieldsPrism.modifyImpl` / `JsonFieldsTraversal.modifyImpl`,
  // both of which now short-circuit via boundary/break (Scala 3.4+).
  noReturns = true

  // We DO use `var` deliberately in the perf-critical mutable builders
  // (`IntArrBuilder`, `ObjArrBuilder`, `PSVec` slice cursors) and `null`
  // as a sentinel value in a few hot-path code paths. Don't ban them.
  noVars = false
  noNulls = false

  // We use `final val` for compile-time constants intentionally.
  noFinalVal = false

  // Universal equality â€” deferred. Enabling `noUniversalEquality`
  // requires threading `CanEqual` witnesses through every `equals`
  // override that compares match-type-valued fields (Affine's Fst/Snd,
  // PSVec's structural equality). See build.sbt:201-208 for the
  // deferral note. Revisit when CanEqual rollout has its own plan.
  noUniversalEquality = false
}
