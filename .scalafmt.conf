version = "3.11.0"
runner.dialect = scala3

maxColumn = 100

// Vertical alignment is pretty, but leads to bigger diffs
align.preset = some

newlines.topLevelStatements = [before,after]

newlines.beforeCurlyLambdaParams = multilineWithCaseOnly

danglingParentheses.callSite = true
danglingParentheses.defnSite = true
danglingParentheses.ctrlSite = true

// `RedundantBraces` dropped from the rewrite list because it
// misparses the specs2 `"…" should { … }` / `>> { … }` DSL on
// our test files as orphan parens. The remaining rules are safe
// for both the specs2 suites and the production sources.
rewrite.rules = [
  AvoidInfix
  RedundantParens
  AsciiSortImports
  SortModifiers
  PreferCurlyFors
]

trailingCommas = multiple

project.git = true

project.excludeFilters = [
   "scalafix-inputs",
   "scalafix-outputs"
]

includeNoParensInSelectChains = true

lineEndings = unix