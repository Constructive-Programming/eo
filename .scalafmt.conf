version = "3.11.1"
runner.dialect = scala3

maxColumn = 100

// Vertical alignment is pretty, but leads to bigger diffs
align.preset = some

newlines.topLevelStatements = [before,after]

newlines.beforeCurlyLambdaParams = multilineWithCaseOnly

danglingParentheses.callSite = true
danglingParentheses.defnSite = true
danglingParentheses.ctrlSite = true

// `RedundantBraces` dropped from the rewrite list because it
// misparses the specs2 `"…" should { … }` / `>> { … }` DSL on
// our test files as orphan parens. The remaining rules are safe
// for both the specs2 suites and the production sources.
//
// `AsciiSortImports` dropped because it sorts selectors uppercase-
// first (`{JsonValueCodec, readFromSubArray}`) while scalafix's
// `OrganizeImports { importSelectorsOrder = SymbolsFirst }` sorts
// lowercase-first (`{readFromSubArray, JsonValueCodec}`). Running
// both back-to-back makes the tools undo each other. Standard
// resolution: let scalafix own import sorting, since it also handles
// grouping and unused-import removal.
rewrite.rules = [
  AvoidInfix
  RedundantParens
  SortModifiers
  PreferCurlyFors
]

// `keep`, not `multiple`: scalafix's OrganizeImports (0.14.7+) fully owns
// import formatting, and it normalises multi-line selectors WITHOUT a trailing
// comma. Under `multiple` scalafmt would re-add that comma on every multi-line
// import and fight scalafix forever. `keep` leaves scalafmt out of import
// (and all other) trailing-comma decisions — existing trailing commas are
// preserved, none are added or removed.
trailingCommas = keep

project.git = true

project.excludeFilters = [
   "scalafix-inputs",
   "scalafix-outputs"
]

includeNoParensInSelectChains = true

lineEndings = unix