<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 881 768" font-size="14" role="img" aria-label="The three-axis optic family taxonomy: focus arity by from-side by read-side">
<style>
  text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         text-anchor: middle; fill: #23272e; }
  .fam   { font-size: 17px; font-weight: 600; }
  .ghost-t { font-size: 15px; font-weight: 600; fill: #8585c5; }
  .sub   { font-size: 11.5px; fill: #5b6068; }
  .axis  { font-size: 13px; font-weight: 600; fill: #3b3b8c; }
  .tick  { font-size: 11.5px; fill: #5b6068; font-style: italic; }
  .layer { font-size: 14px; font-weight: 700; fill: #3b3b8c; }
  .rw    { fill: #dcdcf2; stroke: #3b3b8c; stroke-width: 1.6; }
  .rb    { fill: #e9e3f6; stroke: #5e5eb8; stroke-width: 1.6; }
  .ro    { fill: #f2f2fa; stroke: #8585c5; stroke-width: 1.6; }
  .bo    { fill: #e3ecf6; stroke: #5e5eb8; stroke-width: 1.6; }
  .mod   { fill: #ebebee; stroke: #6a6f78; stroke-width: 1.6; }
  .ghost { fill: none; stroke: #8585c5; stroke-width: 1.2; }
  .drop  { stroke: #8585c5; stroke-width: 1; stroke-dasharray: 3 5; fill: none; }
  .arrow { stroke: #3b3b8c; stroke-width: 1.6; fill: none; }
  .ahead { fill: #3b3b8c; stroke: none; }
  @media (prefers-color-scheme: dark) {
    text   { fill: #e6edf3; }
    .sub, .tick { fill: #9aa4b2; }
    .axis, .layer { fill: #a3a3e6; }
    .ghost-t { fill: #7878d6; }
    .rw    { fill: #34344f; stroke: #7878d6; }
    .rb    { fill: #3a3450; stroke: #a3a3e6; }
    .ro    { fill: #2b2b3a; stroke: #7878d6; }
    .bo    { fill: #2d3a4a; stroke: #a3a3e6; }
    .mod   { fill: #30343a; stroke: #8b93a1; }
    .ghost { stroke: #7878d6; }
    .drop  { stroke: #7878d6; }
    .arrow { stroke: #a3a3e6; }
    .ahead { fill: #a3a3e6; }
  }
</style>
<line class="drop" x1="277.0" y1="119.0" x2="277.0" y2="449.0"/>
<line class="drop" x1="568.0" y1="287.0" x2="568.0" y2="617.0"/>
<line class="drop" x1="374.0" y1="63.0" x2="374.0" y2="393.0"/>
<line class="drop" x1="665.0" y1="231.0" x2="665.0" y2="561.0"/>
<polygon class="rw" points="180.0,175.0 277.0,231.0 374.0,175.0 277.0,119.0"/>
<text class="fam" x="277.0" y="180.0">Lens</text>
<polygon class="rw" points="277.0,231.0 374.0,287.0 471.0,231.0 374.0,175.0"/>
<text class="fam" x="374.0" y="236.0">Optional</text>
<polygon class="rw" points="374.0,287.0 471.0,343.0 568.0,287.0 471.0,231.0"/>
<text class="fam" x="471.0" y="292.0">Traversal</text>
<polygon class="rb" points="277.0,119.0 374.0,175.0 471.0,119.0 374.0,63.0"/>
<text class="fam" x="374.0" y="124.0">Iso</text>
<polygon class="rb" points="374.0,175.0 471.0,231.0 568.0,175.0 471.0,119.0"/>
<text class="fam" x="471.0" y="180.0">Prism</text>
<polygon class="ro" points="374.0,63.0 471.0,119.0 568.0,63.0 471.0,7.0"/>
<text class="fam" x="471.0" y="68.0">Getter</text>
<polygon class="ro" points="471.0,119.0 568.0,175.0 665.0,119.0 568.0,63.0"/>
<text class="fam" x="568.0" y="124.0">AffineFold</text>
<polygon class="ro" points="568.0,175.0 665.0,231.0 762.0,175.0 665.0,119.0"/>
<text class="fam" x="665.0" y="180.0">Fold</text>
<polygon class="ghost" points="471.0,231.0 568.0,287.0 665.0,231.0 568.0,175.0" stroke-dasharray="6 5"/>
<text class="ghost-t" x="568.0" y="224.0">∅</text>
<text class="sub" x="568.0" y="244.0">no many-focus Iso</text>
<polygon class="bo" points="277.0,449.0 374.0,505.0 471.0,449.0 374.0,393.0"/>
<text class="fam" x="374.0" y="454.0">Review</text>
<polygon class="ghost" points="374.0,505.0 471.0,561.0 568.0,505.0 471.0,449.0" stroke-dasharray="6 5"/>
<text class="ghost-t" x="471.0" y="498.0">≡ Review</text>
<text class="sub" x="471.0" y="518.0">mend is total</text>
<polygon class="bo" points="471.0,561.0 568.0,617.0 665.0,561.0 568.0,505.0"/>
<text class="fam" x="568.0" y="566.0">Unfold</text>
<polygon class="mod" points="180.0,505.0 471.0,673.0 568.0,617.0 277.0,449.0"/>
<text class="fam" x="374.0" y="554.0">Modify</text>
<text class="sub" x="374.0" y="574.0">write-only — arity-agnostic</text>
<line class="arrow" x1="139.3" y1="528.5" x2="435.1" y2="699.3"/><polygon class="ahead" points="435.1,699.3 426.1,698.4 429.8,692.0"/>
<text class="axis" x="273.2" y="643.9" transform="rotate(30 273.2 643.9)">focus arity:  one  →  0-or-1  →  many</text>
<line class="arrow" x1="139.3" y1="151.5" x2="435.1" y2="-19.3"/><polygon class="ahead" points="435.1,-19.3 429.8,-12.0 426.1,-18.4"/>
<text class="axis" x="275.2" y="40.1" transform="rotate(-30 275.2 40.1)">from side:  write  →  build  →  none</text>
<line class="arrow" x1="62.0" y1="235.0" x2="62.0" y2="515.0"/><polygon class="ahead" points="62.0,515.0 58.3,506.8 65.7,506.8"/>
<text class="layer" x="62.0" y="191.0">read side</text>
<text class="tick" x="62.0" y="209.0">present (top)</text>
<text class="tick" x="62.0" y="537.0">absent (bottom)</text>
<text class="layer" x="631.0" y="289.2" text-anchor="start">reads</text>
<text class="layer" x="631.0" y="619.2" text-anchor="start">build / write</text>
<text class="tick" x="631.0" y="638.2" text-anchor="start">only</text>
</svg>
