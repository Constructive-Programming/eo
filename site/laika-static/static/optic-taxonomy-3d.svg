<text class="fam" x="481.0" y="773.0">Modify</text>
<text class="sub" x="481.0" y="793.0">the contextual write half — focus-agnostic</text>
<polygon class="plan" points="384.0,668.0 675.0,836.0 772.0,780.0 481.0,612.0" stroke-dasharray="6 5"/>
<text class="plan-t" x="578.0" y="717.0">fallible build</text>
<text class="sub" x="578.0" y="737.0">planned</text>
<line class="arrow" x1="151.2" y1="502.4" x2="447.0" y2="673.2"/><polygon class="ahead" points="447.0,673.2 438.1,672.3 441.7,665.9"/>
<text class="axis" x="285.1" y="609.8" transform="rotate(30 285.1 609.8)">focus nature (ReadCompose):  total  →  fallible  →  multiple</text>
<line class="arrow" x1="151.2" y1="457.6" x2="447.0" y2="286.8"/><polygon class="ahead" points="447.0,286.8 441.7,294.1 438.1,287.7"/>
<text class="axis" x="287.1" y="346.2" transform="rotate(-30 287.1 346.2)">source nature:  total  →  contextual  →  fallible (WriteCompose — planned)</text>
<line class="arrow" x1="70.0" y1="220.0" x2="70.0" y2="800.0"/><polygon class="ahead" points="70.0,800.0 66.3,791.8 73.7,791.8"/>
<text class="layer" x="70.0" y="178.0">capability</text>
<text class="tick" x="70.0" y="196.0">read-only (top)</text>
<text class="tick" x="70.0" y="822.0">write-only (bottom)</text>
<text class="layer" x="665.3" y="280.2" text-anchor="start">read-only</text>
<text class="tick" x="665.3" y="299.2" text-anchor="start">B = Unit: from is vacuous — each family spans the source axis</text>
<text class="layer" x="665.3" y="580.2" text-anchor="start">read-write</text>
<text class="layer" x="665.3" y="880.2" text-anchor="start">write / build only</text>
<text class="tick" x="665.3" y="899.2" text-anchor="start">the from halves of the layer above</text>
</svg>
