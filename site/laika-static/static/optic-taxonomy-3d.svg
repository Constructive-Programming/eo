<text class="fam" x="529.5" y="557.0">Traversal</text>
<text class="sub" x="529.5" y="577.0">fixed/Grate: total · each: contextual</text>
<polygon class="plan" points="384.0,368.0 481.0,424.0 578.0,368.0 481.0,312.0" stroke-dasharray="6 5"/>
<text class="plan-t" x="481.0" y="361.0">fallible write</text>
<text class="sub" x="481.0" y="381.0">planned</text>
<polygon class="plan" points="481.0,424.0 578.0,480.0 675.0,424.0 578.0,368.0" stroke-dasharray="6 5"/>
<text class="plan-t" x="578.0" y="417.0">BiAffine</text>
<text class="sub" x="578.0" y="437.0">planned</text>
<polygon class="plan" points="578.0,480.0 675.0,536.0 772.0,480.0 675.0,424.0" stroke-dasharray="6 5"/>
<text class="plan-t" x="675.0" y="473.0">fallible each</text>
<text class="sub" x="675.0" y="493.0">planned</text>
<polygon class="bo" points="190.0,780.0 287.0,836.0 384.0,780.0 287.0,724.0"/>
<text class="fam" x="287.0" y="785.0">Review</text>
<polygon class="empty" points="287.0,836.0 384.0,892.0 481.0,836.0 384.0,780.0" stroke-dasharray="6 5"/>
<text class="ghost-t" x="384.0" y="829.0">≡ Review</text>
<text class="sub" x="384.0" y="849.0">a Prism's mend is total</text>
<polygon class="bo" points="384.0,892.0 481.0,948.0 578.0,892.0 481.0,836.0"/>
<text class="fam" x="481.0" y="897.0">Unfold</text>
